# ============================================================
# Application
# ============================================================
spring.application.name=location-voitures
server.port=8080

# Charge application-local.properties si present (secrets de dev local).
# Le prefixe "optional:" evite l'erreur quand le fichier n'existe pas
# (typiquement apres un clone, avant que le dev cree son propre fichier).
spring.config.import=optional:classpath:application-local.properties

# ============================================================
# Base de donnees - MySQL (XAMPP : root sans mot de passe par defaut)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/location_voitures_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# Upload de fichiers
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Repertoire de stockage des images uploadees (cree automatiquement au demarrage)
app.upload.dir=uploads

# ============================================================
# Email (Gmail SMTP)
# ============================================================
# Les identifiants Gmail (username, password, from) sont definis dans
# application-local.properties (gitignore). Voir
# application-local.properties.example pour le format attendu.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from-name=Agence Location Voitures

# ============================================================
# Configuration metier
# ============================================================
# Delai en heures avant expiration d'une pre-reservation acceptee
app.location.delai-paiement-heures=48

# URL de base de l'application (pour les liens dans les mails)
app.base-url=http://localhost:8080

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.security=INFO
logging.level.com.example.locvoitures=DEBUG
logging.level.org.hibernate.SQL=DEBUG
