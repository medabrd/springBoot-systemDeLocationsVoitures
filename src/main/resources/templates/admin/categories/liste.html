<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="container py-4">
    <h2><i class="fa-solid fa-folder me-2 text-primary"></i> Categories</h2>

    <div class="row mt-4 g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">Nouvelle categorie</h6>
                    <form th:action="@{/admin/categories}" th:object="${categorie}" method="post">
                        <div class="mb-2">
                            <input type="text" class="form-control" th:field="*{nom}" placeholder="Nom (ex: SUV)"
                                   th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{nom}"></div>
                        </div>
                        <div class="mb-2">
                            <textarea class="form-control" th:field="*{description}" placeholder="Description (optionnelle)" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fa-solid fa-plus me-1"></i>Ajouter
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="list-group shadow-sm" th:unless="${categories.empty}">
                <div th:each="c : ${categories}" class="list-group-item">
                    <div class="row g-2 align-items-center">
                        <form th:action="@{|/admin/categories/${c.id}/modifier|}" method="post" class="col-md-10 row g-2 m-0">
                            <div class="col-md-4">
                                <input type="text" name="nom" th:value="${c.nom}" class="form-control form-control-sm" required/>
                            </div>
                            <div class="col-md-7">
                                <input type="text" name="description" th:value="${c.description}" class="form-control form-control-sm" placeholder="Description"/>
                            </div>
                            <div class="col-md-1">
                                <button type="submit" class="btn btn-sm btn-outline-primary" title="Enregistrer">
                                    <i class="fa-solid fa-save"></i>
                                </button>
                            </div>
                        </form>
                        <div class="col-md-2 text-end">
                            <form th:action="@{|/admin/categories/${c.id}/supprimer|}" method="post" class="d-inline"
                                  onsubmit="return confirm('Supprimer cette categorie ?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${categories.empty}" class="alert alert-info">Aucune categorie enregistree.</div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
