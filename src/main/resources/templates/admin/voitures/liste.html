<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Flotte')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-car me-2 text-primary"></i> Gestion de la flotte</h2>
        <a th:href="@{/admin/voitures/nouveau}" class="btn btn-primary">
            <i class="fa-solid fa-plus me-1"></i> Ajouter une voiture
        </a>
    </div>

    <form th:action="@{/admin/voitures}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 mb-2">
                <div class="col-md-9">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                               placeholder="Modele, marque, categorie, couleur..."/>
                    </div>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="fa-solid fa-filter me-1"></i>Filtrer
                    </button>
                    <a th:href="@{/admin/voitures}" class="btn btn-outline-secondary" title="Reinitialiser">
                        <i class="fa-solid fa-arrow-rotate-left"></i>
                    </a>
                </div>
            </div>
            <div class="row g-2 mt-1">
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="marqueId">
                        <option value="">Toutes les marques</option>
                        <option th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"
                                th:selected="${marqueId == m.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="categorieId">
                        <option value="">Toutes categories</option>
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"
                                th:selected="${categorieId == c.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="transmission">
                        <option value="">Toutes transmissions</option>
                        <option th:each="t : ${transmissions}" th:value="${t}" th:text="${t}"
                                th:selected="${transmission == t}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="carburant">
                        <option value="">Tous carburants</option>
                        <option th:each="c : ${carburants}" th:value="${c}" th:text="${c}"
                                th:selected="${carburant == c}"></option>
                    </select>
                </div>
                <div class="col-md-1">
                    <input type="number" class="form-control form-control-sm" name="prixMin"
                           th:value="${prixMin}" placeholder="Min DT" min="0"/>
                </div>
                <div class="col-md-1">
                    <input type="number" class="form-control form-control-sm" name="prixMax"
                           th:value="${prixMax}" placeholder="Max DT" min="0"/>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="statut">
                        <option value="">Tous statuts</option>
                        <option th:each="s : ${statutsVoiture}" th:value="${s}" th:text="${s}"
                                th:selected="${statut == s}"></option>
                    </select>
                </div>
            </div>

            <!-- Filtre equipements (multi-select AND) -->
            <div class="mt-3">
                <small class="text-muted d-block mb-2">
                    <i class="fa-solid fa-screwdriver-wrench me-1"></i>
                    Equipements requis
                </small>
                <div class="d-flex flex-wrap gap-2">
                    <div class="form-check form-check-inline" th:each="e : ${equipements}">
                        <input class="form-check-input" type="checkbox" name="equipementIds"
                               th:value="${e.id}" th:id="'fe-' + ${e.id}"
                               th:checked="${equipementIds.contains(e.id)}"/>
                        <label class="form-check-label small" th:for="'fe-' + ${e.id}"
                               th:title="${e.description}">
                            <span th:text="${e.nom}"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="card border-0 shadow-sm" th:unless="${voitures.empty}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Photo</th>
                    <th>Vehicule</th>
                    <th>Imm.</th>
                    <th>Tarif</th>
                    <th>Statut</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${voitures.content}">
                    <td>
                        <img th:if="${v.photo}" th:src="@{|/uploads/${v.photo}|}"
                             style="width:60px;height:40px;object-fit:cover;border-radius:4px;"/>
                        <div th:unless="${v.photo}" class="bg-light rounded text-center"
                             style="width:60px;height:40px;line-height:40px;">
                            <i class="fa-solid fa-car text-muted"></i>
                        </div>
                    </td>
                    <td>
                        <strong th:text="${v.marque.nom + ' ' + v.modele}"></strong>
                        <br/><small class="text-muted" th:text="${v.categorie.nom + ' - ' + v.couleur + ' - ' + v.annee}"></small>
                    </td>
                    <td><code th:text="${v.immatriculation}"></code></td>
                    <td><strong th:text="${v.tarifJournalier} + ' DT'"></strong></td>
                    <td>
                        <span class="badge"
                              th:classappend="${v.statutGeneral.name() == 'ACTIVE'} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${v.statutGeneral}">STATUT</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{|/admin/voitures/${v.id}|}" class="btn btn-sm btn-outline-secondary" title="Voir"><i class="fa-solid fa-eye"></i></a>
                        <a th:href="@{|/admin/voitures/${v.id}/modifier|}" class="btn btn-sm btn-outline-primary" title="Modifier"><i class="fa-solid fa-pen"></i></a>
                        <form th:action="@{|/admin/voitures/${v.id}/supprimer|}" method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer cette voiture ? L\'historique de locations doit etre vide.')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${voitures.empty}" class="alert alert-info text-center">
        Aucune voiture. <a th:href="@{/admin/voitures/nouveau}">Ajouter la premiere</a>.
    </div>

    <div th:replace="~{fragments/pagination :: paginer(${voitures}, ${urlBase})}"></div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
