<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Catalogue')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: bannerBanni}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-car me-2 text-primary"></i> Notre flotte</h2>
        <span class="text-muted small" th:if="${voitures}">
            <span th:text="${voitures.totalElements}">0</span> voiture(s)
        </span>
    </div>

    <!-- Recherche + filtres -->
    <form th:action="@{/catalogue}" method="get" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <!-- Periode souhaitee : limite la liste aux voitures effectivement disponibles -->
            <div class="row g-2 mb-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small mb-1">
                        <i class="fa-regular fa-calendar me-1"></i>Date de debut
                    </label>
                    <input type="date" class="form-control" name="dateDebut"
                           th:value="${dateDebut}" th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label small mb-1">
                        <i class="fa-regular fa-calendar-check me-1"></i>Date de fin
                    </label>
                    <input type="date" class="form-control" name="dateFin"
                           th:value="${dateFin}" th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                </div>
                <div class="col-md-4">
                    <small class="text-muted d-block">
                        <i class="fa-solid fa-circle-info me-1"></i>
                        Saisissez une periode pour ne voir que les voitures disponibles sur ces dates.
                    </small>
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-md-9">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                               placeholder="Modele, marque, categorie, couleur..."/>
                    </div>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="fa-solid fa-filter me-1"></i> Filtrer
                    </button>
                    <a th:href="@{/catalogue}" class="btn btn-outline-secondary" title="Reinitialiser">
                        <i class="fa-solid fa-arrow-rotate-left"></i>
                    </a>
                </div>
            </div>

            <div class="row g-2 mt-1">
                <div class="col-md-3">
                    <select class="form-select form-select-sm" name="marqueId">
                        <option value="">Toutes les marques</option>
                        <option th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"
                                th:selected="${marqueId == m.id}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" name="categorieId">
                        <option value="">Toutes les categories</option>
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"
                                th:selected="${categorieId == c.id}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="transmission">
                        <option value="">Transmissions</option>
                        <option th:each="t : ${transmissions}" th:value="${t}" th:text="${t}"
                                th:selected="${transmission == t}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" name="carburant">
                        <option value="">Carburants</option>
                        <option th:each="c : ${carburants}" th:value="${c}" th:text="${c}"
                                th:selected="${carburant == c}"></option>
                    </select>
                </div>
                <div class="col-md-1">
                    <input type="number" class="form-control form-control-sm" name="prixMin"
                           th:value="${prixMin}" placeholder="Min DT" min="0"/>
                </div>
                <div class="col-md-1">
                    <input type="number" class="form-control form-control-sm" name="prixMax"
                           th:value="${prixMax}" placeholder="Max DT" min="0"/>
                </div>
            </div>

            <div class="mt-3">
                <small class="text-muted d-block mb-2">
                    <i class="fa-solid fa-screwdriver-wrench me-1"></i> Equipements requis
                </small>
                <div class="d-flex flex-wrap gap-2">
                    <div class="form-check form-check-inline" th:each="e : ${equipements}">
                        <input class="form-check-input" type="checkbox" name="equipementIds"
                               th:value="${e.id}" th:id="'fe-' + ${e.id}"
                               th:checked="${equipementIds.contains(e.id)}"/>
                        <label class="form-check-label small" th:for="'fe-' + ${e.id}"
                               th:title="${e.description}">
                            <span th:text="${e.nom}"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div th:if="${voitures.empty}" class="alert alert-info text-center">
        <i class="fa-solid fa-circle-info me-2"></i>
        Aucune voiture ne correspond a votre recherche.
    </div>

    <div class="row g-3" th:unless="${voitures.empty}">
        <div class="col-md-6 col-lg-4" th:each="v : ${voitures.content}">
            <div class="card voiture-card shadow-sm">
                <img th:if="${v.photo}"
                     th:src="@{|/uploads/${v.photo}|}"
                     class="card-img-top" alt="Photo voiture"/>
                <div th:unless="${v.photo}"
                     class="card-img-top d-flex align-items-center justify-content-center">
                    <i class="fa-solid fa-car fa-4x text-muted"></i>
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">
                            <span th:text="${v.marque.nom}"></span>
                            <span th:text="${v.modele}"></span>
                        </h5>
                        <span class="badge bg-secondary" th:text="${v.annee}"></span>
                    </div>
                    <p class="text-muted small mb-2">
                        <i class="fa-solid fa-folder me-1"></i><span th:text="${v.categorie.nom}"></span>
                        <span class="mx-1">&middot;</span>
                        <i class="fa-solid fa-palette me-1"></i><span th:text="${v.couleur}"></span>
                    </p>
                    <div class="mb-2">
                        <span th:each="e, it : ${v.equipements}" th:if="${it.index < 4}"
                              class="badge badge-equipement" th:title="${e.description}"
                              th:text="${e.nom}"></span>
                        <span th:if="${v.equipements.size() > 4}" class="badge badge-equipement">
                            +<span th:text="${v.equipements.size() - 4}"></span>
                        </span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div>
                            <span class="text-primary fs-5 fw-bold" th:text="${v.tarifJournalier}"></span>
                            <small class="text-muted">DT/jour</small>
                        </div>
                        <a th:href="@{/catalogue/{id}(id=${v.id}, dateDebut=${dateDebut}, dateFin=${dateFin})}"
                           class="btn btn-outline-primary btn-sm">
                            Details <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: paginer(${voitures}, ${urlBase})}"></div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
