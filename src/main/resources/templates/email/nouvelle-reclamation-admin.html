<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Nouvelle reclamation</title></head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px;">
<div style="max-width:600px; margin:auto; background:#fff; padding:30px; border-radius:8px;">
    <h2 style="color:#fd7e14;">Nouvelle reclamation client</h2>
    <p>Une nouvelle reclamation vient d'etre deposee sur la plateforme.</p>

    <div style="background:#f8f9fa; padding:15px; border-radius:6px; margin:20px 0;">
        <p style="margin:5px 0;"><strong>Client :</strong> <span th:text="${clientNom}"></span></p>
        <p style="margin:5px 0;"><strong>Email :</strong> <span th:text="${clientEmail}"></span></p>
        <p style="margin:5px 0;"><strong>Categorie :</strong> <span th:text="${categorie}"></span></p>
        <p style="margin:5px 0;"><strong>Location concernee :</strong> #<span th:text="${locationId}"></span></p>
        <p style="margin:5px 0;"><strong>Description :</strong></p>
        <p style="margin:5px 0; white-space:pre-wrap; background:#fff; padding:10px; border-radius:4px;" th:text="${description}"></p>
    </div>

    <p style="text-align:center; margin:30px 0;">
        <a th:href="${lien}" style="background:#0d6efd; color:#fff; padding:12px 24px; text-decoration:none; border-radius:4px;">
            Traiter la reclamation
        </a>
    </p>
</div>
</body></html>
